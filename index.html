<style>
/* ============================================================
   BLOOM — a gentle return
   Soft editorial wellness companion for Elizabeth
   ============================================================ */

:root {
  /* grounds */
  --bg:          #f4efe6;   /* warm bone */
  --bg-2:        #efe8dc;   /* oatmeal */
  --surface:     #faf6ef;   /* cream card */
  --surface-2:   #f0e9dd;
  --border:      #e3d8c6;
  --border-soft: #ebe2d4;

  /* ink */
  --text:        #4a3f35;   /* warm umber */
  --text-2:      #7c6f60;
  --text-mute:   #a89a87;
  --text-faint:  #c8bba6;

  /* accents — botanical / earthen */
  --terracotta:  #c17a54;
  --terra-soft:  rgba(193,122,84,0.12);
  --clay:        #c98a6b;
  --rose:        #c98b8b;   /* dusty rose */
  --rose-soft:   rgba(201,139,139,0.12);
  --sage:        #8a9a7b;   /* soft sage */
  --sage-soft:   rgba(138,154,123,0.14);
  --honey:       #d9a441;
  --plum:        #9a7b8a;

  --pad:         18px;

  --serif:   'Fraunces', 'Iowan Old Style', Georgia, serif;
  --display: 'Marcellus', 'Fraunces', Georgia, serif;
  --body:    'Nunito Sans', -apple-system, sans-serif;
}

* { box-sizing: border-box; }

html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
body {
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.6;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-bottom: 96px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* soft botanical atmosphere */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(ellipse 900px 700px at 85% -5%, rgba(201,139,139,0.10), transparent 55%),
    radial-gradient(ellipse 700px 600px at -5% 105%, rgba(138,154,123,0.10), transparent 55%),
    radial-gradient(ellipse 600px 500px at 50% 50%, rgba(217,164,65,0.04), transparent 70%);
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.5;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='900' height='900' viewBox='0 0 900 900'><g fill='none' stroke='%23c8bba6' stroke-width='1' opacity='0.25' stroke-linecap='round'><path d='M120 700 Q120 600 120 520'/><path d='M120 600 Q80 580 60 610 Q100 625 120 600'/><path d='M120 575 Q160 555 180 585 Q140 600 120 575'/><path d='M780 200 Q780 300 780 380'/><path d='M780 280 Q740 260 720 290 Q760 305 780 280'/><path d='M780 255 Q820 235 840 265 Q800 280 780 255'/><circle cx='120' cy='510' r='6'/><circle cx='780' cy='190' r='6'/></g></svg>");
  background-size: 900px 900px;
  background-position: center;
  background-repeat: no-repeat;
}

main { position: relative; z-index: 1; }

/* grain */
.grain {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");
}

/* ---------- header ---------- */
.cmd {
  background: transparent;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.cmd-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 18px var(--pad) 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.cmd-brand {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.cmd-brand .sprig {
  width: 20px; height: 20px;
  flex-shrink: 0;
}
.cmd-meta {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-mute);
  text-transform: lowercase;
  text-align: right;
  line-height: 1.5;
}

.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 var(--pad);
}

/* ---------- hero / warm note ---------- */
.hero {
  padding: 22px 0 26px;
}
.hero-date {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 14px;
}
.hero-greeting {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(30px, 7vw, 44px);
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--text);
  margin: 0 0 4px;
}
.hero-greeting em {
  font-style: italic;
  color: var(--terracotta);
}
.hero-note {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  line-height: 1.55;
  color: var(--text-2);
  margin-top: 16px;
  padding-left: 16px;
  border-left: 2px solid var(--clay);
  max-width: 90%;
}

/* ---------- presence (replaces streak) ---------- */
.presence {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 8px 0 4px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 18px;
}
.presence-bloom {
  flex-shrink: 0;
  width: 42px; height: 42px;
}
.presence-text {
  flex: 1;
  min-width: 0;
}
.presence-count {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  color: var(--terracotta);
  line-height: 1;
}
.presence-count .lbl {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.02em;
  margin-left: 6px;
  font-weight: 400;
}
.presence-sub {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-mute);
  margin-top: 4px;
  line-height: 1.45;
}

/* ---------- welcome-back card ---------- */
.welcome-back {
  margin: 18px 0 6px;
  padding: 20px 20px;
  background: linear-gradient(180deg, var(--rose-soft), transparent);
  border: 1px solid rgba(201,139,139,0.25);
  border-radius: 18px;
  position: relative;
}
.welcome-back h3 {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 21px;
  color: var(--text);
  margin: 0 0 6px;
  letter-spacing: -0.005em;
}
.welcome-back p {
  font-family: var(--body);
  font-size: 14px;
  color: var(--text-2);
  margin: 0;
  line-height: 1.55;
}

/* ---------- card / section ---------- */
.card {
  margin: 18px 0;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 20px;
  overflow: hidden;
}
.card-head {
  padding: 18px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-head-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.card-icon {
  width: 26px; height: 26px;
  flex-shrink: 0;
}
.card-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
  margin: 0;
  letter-spacing: -0.005em;
}
.card-title em { font-style: italic; color: var(--text-2); font-weight: 300; }
.card-tag {
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.card-tag.sage { color: var(--sage); border-color: rgba(138,154,123,0.4); background: var(--sage-soft); }
.card-tag.rose { color: var(--rose); border-color: rgba(201,139,139,0.4); background: var(--rose-soft); }
.card-tag.terra { color: var(--terracotta); border-color: rgba(193,122,84,0.4); background: var(--terra-soft); }
.card-body { padding: 4px 0 8px; }
.card-intro {
  padding: 0 20px 12px;
  font-family: var(--body);
  font-size: 13px;
  color: var(--text-mute);
  line-height: 1.5;
  font-style: italic;
}

/* ---------- soft check item ---------- */
.item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 13px 20px;
  cursor: pointer;
  border-top: 1px solid var(--border-soft);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease;
}
.item:first-child { border-top: none; }
.item:hover { background: rgba(193,122,84,0.03); }

.bud {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg);
  margin-top: 1px;
  position: relative;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bud::after {
  content: '';
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--terracotta);
  transform: scale(0);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.item.checked .bud {
  border-color: var(--terracotta);
  background: var(--terra-soft);
}
.item.checked .bud::after { transform: scale(1); }
.item.checked .item-text { color: var(--text-mute); }
.item.checked .item-text strong { color: var(--text-2); }

.item-main { flex: 1; min-width: 0; padding-top: 1px; }
.item-text {
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.4;
  color: var(--text);
  transition: color 0.2s ease;
}
.item-text strong { font-weight: 600; }
.item-detail {
  font-family: var(--body);
  font-size: 12.5px;
  color: var(--text-mute);
  line-height: 1.5;
  margin-top: 5px;
}

/* sage variant for movement */
.item.move.checked .bud { border-color: var(--sage); background: var(--sage-soft); }
.item.move.checked .bud::after { background: var(--sage); }
/* rose variant for nourish */
.item.nourish.checked .bud { border-color: var(--rose); background: var(--rose-soft); }
.item.nourish.checked .bud::after { background: var(--rose); }

/* ---------- movement window picker ---------- */
.window-row {
  padding: 14px 20px 6px;
}
.window-label {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 10px;
}
.window-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.window-chip {
  flex: 1 1 auto;
  min-width: 0;
  padding: 12px 10px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--bg);
  color: var(--text-2);
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
}
.window-chip small {
  font-size: 9.5px;
  color: var(--text-mute);
  font-weight: 400;
  letter-spacing: 0.02em;
}
.window-chip:hover { border-color: var(--sage); }
.window-chip.active {
  background: var(--sage-soft);
  border-color: var(--sage);
  color: var(--sage);
}
.window-chip.active small { color: var(--sage); opacity: 0.8; }
.window-chip.last-resort.active {
  background: rgba(154,123,138,0.12);
  border-color: var(--plum);
  color: var(--plum);
}

/* ---------- movement menu ---------- */
.move-menu {
  padding: 6px 20px 4px;
}
.move-opt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.move-opt:last-child { border-bottom: none; }
.move-opt-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--sage);
  flex-shrink: 0;
  opacity: 0.6;
}
.move-opt-text {
  font-family: var(--body);
  font-size: 14px;
  color: var(--text);
}
.move-opt-text small {
  display: block;
  font-size: 11.5px;
  color: var(--text-mute);
  margin-top: 2px;
}

/* ---------- permission / let-go card ---------- */
.permission {
  margin: 18px 0;
  padding: 22px 22px;
  background: var(--sage-soft);
  border: 1px solid rgba(138,154,123,0.25);
  border-radius: 20px;
  text-align: center;
}
.permission-sprig {
  width: 34px; height: 34px;
  margin: 0 auto 10px;
  display: block;
}
.permission p {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 18px;
  line-height: 1.5;
  color: var(--text);
  margin: 0;
  letter-spacing: -0.005em;
}
.permission .attribution {
  display: block;
  margin-top: 12px;
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-mute);
  font-style: normal;
}

/* ---------- collapsibles ---------- */
.fold {
  margin: 14px 20px;
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  background: var(--bg);
  overflow: hidden;
}
.fold summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  -webkit-tap-highlight-color: transparent;
}
.fold summary::-webkit-details-marker { display: none; }
.fold-title {
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  font-weight: 600;
}
.fold-chev {
  color: var(--text-mute);
  font-size: 14px;
  transition: transform 0.25s ease;
  font-family: var(--serif);
}
.fold[open] .fold-chev { transform: rotate(90deg); color: var(--terracotta); }
.fold-body {
  padding: 4px 16px 16px;
  border-top: 1px solid var(--border-soft);
  font-family: var(--body);
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.65;
}
.fold-body p { margin: 12px 0; }
.fold-body strong { color: var(--text); font-weight: 600; }
.fold-body .recipe { margin: 14px 0; }
.fold-body .recipe-name {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--terracotta);
  margin-bottom: 4px;
}
.fold-body .recipe-how { font-size: 13px; color: var(--text-2); }

/* ---------- nourish guidance list ---------- */
.nourish-guide {
  padding: 4px 20px 8px;
}
.nourish-principle {
  display: flex;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.nourish-principle:last-child { border-bottom: none; }
.nourish-principle .num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--clay);
  flex-shrink: 0;
  width: 22px;
  line-height: 1.2;
}
.nourish-principle .body {
  flex: 1;
  font-family: var(--body);
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}
.nourish-principle .body small {
  display: block;
  color: var(--text-mute);
  font-size: 12px;
  margin-top: 2px;
}

/* treats callout */
.treats-note {
  margin: 10px 20px 4px;
  padding: 14px 16px;
  background: var(--rose-soft);
  border-radius: 14px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 14.5px;
  color: var(--text-2);
  line-height: 1.55;
}
.treats-note b { color: var(--rose); font-style: normal; font-weight: 500; }

/* ---------- bottom bar ---------- */
.bar {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: rgba(244,239,230,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  z-index: 80;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bar-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 12px var(--pad);
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-done {
  flex: 1;
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--text-mute);
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar-done .seeds {
  display: flex;
  gap: 4px;
}
.bar-seed {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  transition: all 0.3s ease;
}
.bar-seed.filled { background: var(--terracotta); border-color: var(--terracotta); }
.bar-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  height: 38px;
  padding: 0 14px;
  border-radius: 20px;
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bar-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.bar-btn.icon { width: 38px; padding: 0; font-size: 16px; }
.bar-btn.locked { color: var(--text-faint); border-color: var(--border-soft); }
.bar-btn.locked:hover { color: var(--text-faint); border-color: var(--border-soft); }

/* ---------- modal ---------- */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(74,63,53,0.35);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 50px 16px 40px;
  overflow-y: auto;
}
.overlay.open { display: flex; }
.modal {
  width: 100%;
  max-width: 520px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  position: relative;
  margin: auto 0;
  overflow: hidden;
}
.modal-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border-soft);
}
.modal-hd h3 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  margin: 0;
  color: var(--text);
}
.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mute);
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 15px;
  font-family: var(--body);
}

<script>
/* ============================================================
   BLOOM — a gentle return
   Elizabeth's companion. Built to nurture, never to nag.
   Core inversion vs. a streak app: this NEVER punishes a miss.
   It counts showing up (only goes up) and welcomes her back.
   ============================================================ */

const STORE_KEY = 'bloom_v1';
const DAY_NAMES = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_DISPLAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function keyFromDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayName() { return DAY_NAMES[new Date().getDay()]; }

/* ============================================================
   STORE
   ============================================================ */
function defaultStore() {
  return {
    history: {},          // 'YYYY-MM-DD': { window, movement, checks:{}, feel, note }
    weekly: {},           // ISO-week-start: { weight, strength, feel, journal }
    reflections: {},      // Sunday date: { kindToSelf, energy, oneJoy, completedAt }
    settings: {
      snack: null,        // 'yogurt' | 'eggs'
      units: 'imperial',
      sauna: false,
      travel: false,
      startDate: null,
    },
    lastOpen: null,       // last date she opened the app (for welcome-back)
    showingUpTotal: 0,    // cumulative count of days she showed up. ONLY goes up.
    countedDays: {},      // 'YYYY-MM-DD': true — days already counted toward showingUpTotal
  };
}
function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultStore();
    return Object.assign(defaultStore(), JSON.parse(raw));
  } catch (e) { return defaultStore(); }
}
function saveStore() { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }
let store = loadStore();

// Backfill
if (!store.settings.startDate) store.settings.startDate = todayKey();
if (typeof store.showingUpTotal !== 'number') store.showingUpTotal = 0;
if (!store.countedDays) store.countedDays = {};
if (!store.reflections) store.reflections = {};
if (!store.weekly) store.weekly = {};

function getToday() {
  const k = todayKey();
  if (!store.history[k]) {
    store.history[k] = { window: null, movement: null, checks: {}, feel: null, note: '' };
  }
  return store.history[k];
}

/* ============================================================
   WEEK MATH
   ============================================================ */
function isoWeekStart(dateOrKey) {
  const d = (typeof dateOrKey === 'string') ? new Date(dateOrKey + 'T12:00:00') : new Date(dateOrKey.getTime());
  d.setHours(0,0,0,0);
  const dow = d.getDay();
  const sinceMon = (dow === 0) ? 6 : (dow - 1);
  d.setDate(d.getDate() - sinceMon);
  return keyFromDate(d);
}
function lastNWeeks(n) {
  const out = [];
  let cur = new Date();
  for (let i = 0; i < n; i++) { out.unshift(isoWeekStart(cur)); cur = new Date(cur.getTime() - 7*86400000); }
  return [...new Set(out)];
}
function prettyDate(d) {
  return DAY_DISPLAY[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
}

/* ============================================================
   PRESENCE — the gentle engine
   "Showing up" = chose a movement window OR logged any movement
   OR nourished. The lightest possible bar. It only ever counts UP.
   ============================================================ */
function showedUpToday() {
  const t = getToday();
  if (t.window) return true;
  if (t.movement) return true;
  if (t.checks && Object.values(t.checks).some(Boolean)) return true;
  if (t.feel) return true;
  return false;
}

// Count today exactly once, ever. Never decrements.
function maybeCountToday() {
  const k = todayKey();
  if (!store.countedDays[k] && showedUpToday()) {
    store.countedDays[k] = true;
    store.showingUpTotal = (store.showingUpTotal || 0) + 1;
    saveStore();
  }
}

// Days since she last opened — for warm welcome-back (never guilt)
function daysSinceLastOpen() {
  if (!store.lastOpen) return 0;
  const last = new Date(store.lastOpen + 'T12:00:00');
  const now = new Date(todayKey() + 'T12:00:00');
  return Math.round((now - last) / 86400000);
}

/* ============================================================
   WARM MORNING NOTES — rotate, gentle, in her voice / to her
   80% Sami spirit: patience, class, realness. + soft permission
   to release the house-cleaning pressure, never as a checklist.
   ============================================================ */
const MORNING_NOTES = [
  // Mary Oliver
  "Tell me, what is it you plan to do with your one wild and precious life?",
  // Nayyirah Waheed
  "you are made of the softest things and the strongest things.",
  // Rumi (Coleman Barks translation)
  "Let yourself be silently drawn by the strange pull of what you really love.",
  // Toni Morrison
  "You are your own best thing.",
  // Wendell Berry
  "It may be that when we no longer know what to do, we have come to our real work, and when we no longer know which way to go, we have begun our real journey.",
  // Mary Oliver again — Wild Geese
  "You do not have to be good. You do not have to walk on your knees for a hundred miles through the desert, repenting.",
  // Lucille Clifton
  "won't you celebrate with me what i have shaped into a kind of life?",
  // Glennon Doyle
  "First the pain, then the waiting, then the rising.",
  // Hafiz (Daniel Ladinsky translation)
  "Even after all this time, the sun never says to the earth, 'You owe me.' Look what happens with a love like that — it lights the whole sky.",
  // e.e. cummings
  "i carry your heart with me (i carry it in my heart).",
  // Rainier Maria Rilke
  "I want to beg you, as much as I can, dear sir, to be patient toward all that is unsolved in your heart.",
  // Mary Oliver — The Summer Day
  "I don't know exactly what a prayer is. I do know how to pay attention.",
];
function morningNote() {
  // Stable per-day so it doesn't flicker on re-render
  const k = todayKey();
  let h = 0; for (let i=0;i<k.length;i++) h = (h*31 + k.charCodeAt(i))|0;
  return MORNING_NOTES[Math.abs(h) % MORNING_NOTES.length];
}

const GREETINGS = ['Good morning', 'Hello, you', 'Hi, love', 'Morning', 'Here you are'];
function greeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Still up';
  if (h < 12) return GREETINGS[new Date().getDate() % GREETINGS.length];
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

/* ============================================================
   MOVEMENT WINDOWS — sized to her real life
   ============================================================ */
const WINDOWS = [
  { id: 'morning', label: 'Morning', sub: 'after Ana settles', lastResort: false },
  { id: 'carla',   label: 'Carla here', sub: 'Ava & Ana covered', lastResort: false },
  { id: 'nap',     label: 'Naptime', sub: 'if it lands', lastResort: false },
  { id: 'evening', label: 'Evening', sub: 'last resort', lastResort: true },
];

const MOVEMENT_MENU = [
  { id: 'peloton', label: 'Peloton ride or class', note: '20–30 min — pick a class you love, not the hardest one' },
  { id: 'run',     label: 'Run', note: 'Easy pace counts. Stroller counts. Walk breaks count.' },
  { id: 'lift',    label: 'Lift', note: 'Even 20 min of strength rebuilds you. Go lighter than your old self for now.' },
  { id: 'bike',    label: 'Bike', note: 'Outdoor or trainer. Moving air, moving legs.' },
  { id: 'walk',    label: 'Just a walk', note: 'Always available. Always enough on a hard day.' },
];

/* ============================================================
   NOURISH — gentle, additive. Never restrictive. Treats welcome.
   ============================================================ */
const NOURISH_PRINCIPLES = [
  { t: 'Protein first', d: 'Eggs, yogurt, meat, a shake. It steadies energy and milk supply more than anything else.' },
  { t: 'Add color', d: 'Fruit or a vegetable alongside whatever you\'re already eating. Add, don\'t subtract.' },
  { t: 'Water near you', d: 'Nursing around the clock is thirsty work. A full glass within reach beats a perfect meal.' },
  { t: 'Eat enough', d: 'Now is not the season to undereat. Fuel the body that\'s feeding a baby.' },
];

const TREATS_NOTES = [
  "Baking is allowed. It's not a slip — it's something that makes you happy, and that matters right now.",
  "A treat is part of a good life, not a break from a good one. Enjoy it without the math.",
  "You love a treat. Good. Have it, taste it fully, and don't spend a second feeling guilty.",
  "The goal was never restriction. It's strength and feeling like you. Cake fits inside that.",
];
function treatsNote() {
  const k = todayKey();
  let h = 7; for (let i=0;i<k.length;i++) h = (h*17 + k.charCodeAt(i))|0;
  return TREATS_NOTES[Math.abs(h) % TREATS_NOTES.length];
}

/* ============================================================
   NOURISH CHECK ITEMS (gentle wins, rose-colored)
   ============================================================ */
function nourishItems() {
  const snack = store.settings.snack;
  let snackText = 'A nourishing afternoon snack';
  if (snack === 'yogurt') snackText = 'Greek yogurt + berries';
  else if (snack === 'eggs') snackText = 'Eggs + fruit';
  return [
    { id: 'n-protein', text: 'A protein-first breakfast', detail: 'Eggs, yogurt, a shake — whatever\'s easiest to reach.' },
    { id: 'n-water',   text: 'A full glass of water', detail: 'Keep one near wherever you feed Ana.' },
    { id: 'n-snack',   text: snackText, detail: snack ? 'Your chosen easy snack.' : 'Pick a default in settings, or just eat something good.' },
    { id: 'n-color',   text: 'Something colorful', detail: 'Fruit or veg alongside one meal. That\'s the whole ask.' },
  ];
}

/* ============================================================
   PERMISSION CARD — soft Sami-voiced "let it go"
   Targets the house-cleaning anxiety WITHOUT a cleaning checklist.
   ============================================================ */
const PERMISSIONS = [
  // Anne Lamott — Bird by Bird

/* ============================================================
   ELEMENT HELPER
   ============================================================ */
function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'dataset') Object.assign(e.dataset, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of kids) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

    if (placeholder) input.placeholder = placeholder;
    input.style.padding = '9px 12px';
    input.value = data[key] != null ? data[key] : '';
    if (type === 'text') { input.style.minHeight = '40px'; input.style.resize = 'vertical'; }
    input.addEventListener('change', () => {
      if (!store.weekly[wk]) store.weekly[wk] = {};

      else store.weekly[wk][key] = (type === 'number') ? parseFloat(v) : v;

    opts.forEach(o => {

          card._a[key] = o;
          w.querySelectorAll('.reflect-opt').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          sync();
        }
      }, o);
      grid.appendChild(b);
    });
    w.appendChild(grid);
    return w;
  }

  body.appendChild(q('Were you kind to yourself this week?', 'kindToSelf', ['Mostly', 'Some', 'I tried']));
  body.appendChild(q('How was your energy?', 'energy', ['Steady', 'Up & down', 'Depleted']));

  const ta = document.createElement('textarea');
  ta.className = 'reflect-input';
  ta.placeholder = 'a nap, a ride, Ava\'s laugh, a quiet moment…';
  ta.addEventListener('input', () => { card._a.oneJoy = ta.value; sync(); });
  jq.appendChild(ta);
  body.appendChild(jq);

  const submit = el('button', { class: 'reflect-submit', disabled: 'disabled' }, 'Close the week gently');
  function sync() {
    const a = card._a;
    const ready = a.kindToSelf && a.energy && a.oneJoy.trim().length > 0;

  }
  submit.addEventListener('click', () => {
    store.reflections[sKey] = { ...card._a, oneJoy: card._a.oneJoy.trim(), completedAt: new Date().toISOString() };

    showToast('Your bloom is open. Go see how far you\'ve come.');

function updateBar() {
  const t = getToday();
  // Count gentle "touches": window, movement, each nourish check, feel
  const touched = [
    !!t.window,
    !!t.movement,
    !!t.checks['n-protein'],
    !!t.checks['n-water'],
    !!t.checks['n-snack'],
    !!t.checks['n-color'],
  ];
  const seeds = document.getElementById('bar-seeds');
  if (seeds) {
    seeds.innerHTML = '';
    touched.forEach(on => {
      const s = el('div', { class: 'bar-seed' + (on ? ' filled' : '') });
      seeds.appendChild(s);
    });
  }
  const txt = document.getElementById('bar-done-text');
  if (txt) {
    const n = touched.filter(Boolean).length;
    if (n === 0) txt.textContent = 'a soft start';
    else if (n <= 2) txt.textContent = 'you\'ve begun';
    else if (n <= 4) txt.textContent = 'lovely momentum';
    else txt.textContent = 'a full, gentle day';
  }
}

/* ============================================================
   BLOOM (progress) — Sunday-gated after reflection
   ============================================================ */
function canViewBloom() {
  if (dayName() !== 'sunday') return false;
  const r = store.reflections[todayKey()];
  return !!(r && r.completedAt);
}
function updateBloomButton() {
  const btn = document.getElementById('btn-progress');
  if (!btn) return;
  const open = canViewBloom();
  btn.classList.toggle('locked', !open);
  btn.title = open ? 'Your bloom' : 'Opens Sundays, after you reflect';
}
function openBloom() {
  if (!canViewBloom()) {
    showToast(dayName() === 'sunday' ? 'Reflect first — then your bloom opens' : 'Your bloom opens Sundays, gently');
    return;
  }
  renderBloom();
  document.getElementById('modal-progress').classList.add('open');
}
function closeBloom() { document.getElementById('modal-progress').classList.remove('open'); }

function renderBloom() {
  const body = document.getElementById('progress-body');
  body.innerHTML = '';

  // Showing-up bars (last 12 weeks) — the kind, additive view
  const weeks = lastNWeeks(12);
  const weekShowUp = weeks.map(wk => {
    const start = new Date(wk + 'T12:00:00');
    let n = 0;
    for (let i=0;i<7;i++) {
      const dk = keyFromDate(new Date(start.getTime() + i*86400000));
      if (store.countedDays[dk]) n++;
    }
    return { label: wk.slice(5), n };
  });
  const suBlock = el('div', { class: 'chart-block' });
  suBlock.appendChild(el('div', { class: 'chart-hd' }, 'Days you showed up'));
  suBlock.appendChild(el('div', { style: 'font-family:var(--body);font-size:12px;color:var(--text-mute);margin-bottom:10px;' },
    'Not a streak. Just proof. Total so far: ' + (store.showingUpTotal || 0) + '.'));
  const su = el('div', { class: 'showing-up' });
  const maxN = 7;
  weekShowUp.forEach(w => {
    const col = el('div', { class: 'su-col' });
    col.appendChild(el('div', { class: 'su-count' }, String(w.n)));
    const bar = el('div', { class: 'su-bar' });
    bar.style.height = Math.max(3, (w.n / maxN) * 56) + 'px';
    col.appendChild(bar);
    col.appendChild(el('div', { class: 'su-label' }, w.label));
    su.appendChild(col);
  });
  suBlock.appendChild(su);
  body.appendChild(suBlock);

  // Weight (hidden until here) — quiet, framed kindly
  const wSeries = [];
  Object.keys(store.weekly).sort().forEach(k => {
    const w = store.weekly[k];
    if (w && typeof w.weight === 'number' && !isNaN(w.weight)) wSeries.push({ label: k.slice(5), v: w.weight });
  });
  if (wSeries.length >= 1) {
    body.appendChild(buildKindChart('Your body, slowly', wSeries, store.settings.units === 'metric' ? 'kg' : 'lb'));
  }

  // Strength notes log
  const strengthLogs = [];
  Object.keys(store.weekly).sort().forEach(k => {
    const w = store.weekly[k];
    if (w && w.strength && w.strength.trim()) strengthLogs.push({ date: k, text: w.strength.trim() });
  });
  if (strengthLogs.length) {
    const blk = el('div', { class: 'chart-block' });
    blk.appendChild(el('div', { class: 'chart-hd' }, 'Getting stronger'));
    const list = el('ul', { class: 'journal-log' });
    strengthLogs.forEach(s => {
      const li = el('li', { class: 'journal-entry' });
      li.appendChild(el('div', { class: 'journal-date' }, s.date.slice(5)));
      li.appendChild(el('div', { class: 'journal-text' }, '"' + s.text + '"'));
      list.appendChild(li);
    });
    blk.appendChild(list);
    body.appendChild(blk);
  }

  // Joys + small wins log (from reflections + Saturday journal)
  const joys = [];
  Object.keys(store.reflections).sort().forEach(k => {
    const r = store.reflections[k];
    if (r && r.oneJoy) joys.push({ date: k, text: r.oneJoy });
  });
  Object.keys(store.weekly).sort().forEach(k => {
    const w = store.weekly[k];
    if (w && w.journal && w.journal.trim()) joys.push({ date: k, text: w.journal.trim() });
  });
  if (joys.length) {
    const blk = el('div', { class: 'chart-block' });
    blk.appendChild(el('div', { class: 'chart-hd' }, 'Joys you noticed'));
    const list = el('ul', { class: 'journal-log' });
    joys.forEach(j => {
      const li = el('li', { class: 'journal-entry' });
      li.appendChild(el('div', { class: 'journal-date' }, j.date.slice(5)));
      li.appendChild(el('div', { class: 'journal-text' }, '"' + j.text + '"'));
      list.appendChild(li);
    });
    blk.appendChild(list);
    body.appendChild(blk);
  }

  // Closing bloom message
  const close = el('div', { class: 'bloom-complete' });
  close.innerHTML =
    '<svg viewBox="0 0 48 48" fill="none" stroke="#c17a54" stroke-width="1.4" stroke-linecap="round"><path d="M24 42 L24 18"/><path d="M24 26 Q13 22 9 30 Q19 34 24 26"/><path d="M24 22 Q35 18 39 26 Q29 30 24 22"/><circle cx="24" cy="13" r="5.5" fill="#c98a6b" stroke="none"/></svg>' +
    '<h3>Look how far.</h3>' +
    '<p>Not fast. Not perfect. Yours. Close this, and go be with your girls.</p>';
  body.appendChild(close);

  if (body.children.length === 1) {
    body.innerHTML = '<div class="chart-empty">Your bloom fills in as the weeks go by. Keep showing up — softly.</div>';
  }
}

function buildKindChart(title, series, unit) {
  const blk = el('div', { class: 'chart-block' });
  blk.appendChild(el('div', { class: 'chart-hd' }, title));
  const latest = series[series.length - 1].v;
  const first = series[0].v;
  const delta = latest - first;
  const now = el('div', { class: 'chart-now' });
  now.innerHTML = latest.toFixed(1) + '<span class="unit">' + unit + '</span>';
  if (series.length > 1 && Math.abs(delta) >= 0.1) {
    const cls = delta < 0 ? 'good' : 'flat';
    now.innerHTML += '<span class="delta ' + cls + '">' + (delta < 0 ? '↓ ' : '') + Math.abs(delta).toFixed(1) + ' since the start</span>';
  }
  blk.appendChild(now);
  blk.appendChild(el('div', { style: 'font-family:var(--serif);font-style:italic;font-size:13px;color:var(--text-mute);margin-top:2px;' },
    'Slowly is the point. Your body is still doing the work of feeding Ana.'));

  if (series.length >= 2) {
    const wrap = el('div', { class: 'chart-svg-wrap' });
    const n = series.length;
    const vals = series.map(s => s.v);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const W = 100, H = 100, padX = 8, padY = 12;
    const pts = series.map((s, i) => {
      const x = padX + (i/(n-1))*(W - 2*padX);
      const y = padY + (1 - (s.v - min)/range)*(H - 2*padY);
      return [x, y];
    });
    let pathD = 'M ' + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L ');
    let areaD = pathD + ' L ' + pts[n-1][0].toFixed(1) + ' ' + H + ' L ' + pts[0][0].toFixed(1) + ' ' + H + ' Z';
    let svg = '';
    series.forEach((s,i) => { svg += '<text x="' + pts[i][0].toFixed(1) + '" y="' + (H+2) + '" text-anchor="middle" dominant-baseline="hanging">' + s.label + '</text>'; });
    svg += '<path d="' + areaD + '" fill="var(--rose)" opacity="0.08" />';
    svg += '<path d="' + pathD + '" fill="none" stroke="var(--rose)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />';
    pts.forEach(p => { svg += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="2.4" fill="var(--rose)" />'; });
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + (H+12));
    svgEl.setAttribute('preserveAspectRatio', 'none');
    svgEl.innerHTML = svg;
    wrap.appendChild(svgEl);
    blk.appendChild(wrap);
  }
  return blk;
}

   ============================================================ */
function openSettings() { document.getElementById('modal-settings').classList.add('open'); syncSettings(); }
function closeSettings() { document.getElementById('modal-settings').classList.remove('open'); }
function syncSettings() {
  document.querySelectorAll('#opt-snack button').forEach(b => b.classList.toggle('active', b.dataset.val === store.settings.snack));
  document.querySelectorAll('#opt-units button').forEach(b => b.classList.toggle('active', b.dataset.val === store.settings.units));
  document.querySelectorAll('#opt-sauna button').forEach(b => b.classList.toggle('active', (b.dataset.val === 'on') === !!store.settings.sauna));
  document.querySelectorAll('#opt-travel button').forEach(b => b.classList.toggle('active', (b.dataset.val === 'on') === !!store.settings.travel));
}

document.getElementById('btn-settings').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
document.getElementById('modal-settings').addEventListener('click', e => { if (e.target.id === 'modal-settings') closeSettings(); });

document.querySelectorAll('#opt-snack button').forEach(b => b.addEventListener('click', () => {
  store.settings.snack = b.dataset.val; saveStore(); syncSettings(); render();
}));
document.querySelectorAll('#opt-units button').forEach(b => b.addEventListener('click', () => {
  store.settings.units = b.dataset.val; saveStore(); syncSettings();
}));
document.querySelectorAll('#opt-sauna button').forEach(b => b.addEventListener('click', () => {

  if (!confirm('Clear just today and begin again? Your showing-up count stays — it never goes backward.')) return;
  const k = todayKey();
  // Clearing today's actions does NOT decrement showingUpTotal (it only ever goes up)
  store.history[k] = { window: null, movement: null, checks: {}, feel: null, note: '' };
  saveStore(); closeSettings(); render(); showToast('A fresh start for today');
});
document.getElementById('btn-reset-all').addEventListener('click', () => {
  if (!confirm('Erase everything — all history, weeks, and your bloom? This can\'t be undone.')) return;
  if (!confirm('Are you sure? This is permanent.')) return;
  localStorage.removeItem(STORE_KEY);
  store = defaultStore();
  store.settings.startDate = todayKey();
  saveStore(); closeSettings(); render(); showToast('Everything cleared. A clean beginning.');

  const t = document.getElementById('toast');

  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
