<style>
/* ============================================================
   BLOOM — a gentle return
   Soft editorial wellness companion for Elizabeth
   ============================================================ */

:root {
  /* grounds */
  --bg:          #f4efe6;   /* warm bone */
  --bg-2:        #efe8dc;   /* oatmeal */
  --surface:     #faf6ef;   /* cream card */
  --surface-2:   #f0e9dd;
  --border:      #e3d8c6;
  --border-soft: #ebe2d4;

  /* ink */
  --text:        #4a3f35;   /* warm umber */
  --text-2:      #7c6f60;
  --text-mute:   #a89a87;
  --text-faint:  #c8bba6;

  /* accents — botanical / earthen */
  --terracotta:  #c17a54;
  --terra-soft:  rgba(193,122,84,0.12);
  --clay:        #c98a6b;
  --rose:        #c98b8b;   /* dusty rose */
  --rose-soft:   rgba(201,139,139,0.12);
  --sage:        #8a9a7b;   /* soft sage */
  --sage-soft:   rgba(138,154,123,0.14);
  --honey:       #d9a441;
  --plum:        #9a7b8a;

  --pad:         18px;

  --serif:   'Fraunces', 'Iowan Old Style', Georgia, serif;
  --display: 'Marcellus', 'Fraunces', Georgia, serif;
  --body:    'Nunito Sans', -apple-system, sans-serif;
}

* { box-sizing: border-box; }

html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
body {
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.6;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-bottom: 96px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* soft botanical atmosphere */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(ellipse 900px 700px at 85% -5%, rgba(201,139,139,0.10), transparent 55%),
    radial-gradient(ellipse 700px 600px at -5% 105%, rgba(138,154,123,0.10), transparent 55%),
    radial-gradient(ellipse 600px 500px at 50% 50%, rgba(217,164,65,0.04), transparent 70%);
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.5;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='900' height='900' viewBox='0 0 900 900'><g fill='none' stroke='%23c8bba6' stroke-width='1' opacity='0.25' stroke-linecap='round'><path d='M120 700 Q120 600 120 520'/><path d='M120 600 Q80 580 60 610 Q100 625 120 600'/><path d='M120 575 Q160 555 180 585 Q140 600 120 575'/><path d='M780 200 Q780 300 780 380'/><path d='M780 280 Q740 260 720 290 Q760 305 780 280'/><path d='M780 255 Q820 235 840 265 Q800 280 780 255'/><circle cx='120' cy='510' r='6'/><circle cx='780' cy='190' r='6'/></g></svg>");
  background-size: 900px 900px;
  background-position: center;
  background-repeat: no-repeat;
}

main { position: relative; z-index: 1; }

/* grain */
.grain {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");
}

/* ---------- header ---------- */
.cmd {
  background: transparent;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.cmd-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 18px var(--pad) 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.cmd-brand {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.cmd-brand .sprig {
  width: 20px; height: 20px;
  flex-shrink: 0;
}
.cmd-meta {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-mute);
  text-transform: lowercase;
  text-align: right;
  line-height: 1.5;
}

.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 var(--pad);
}

/* ---------- hero / warm note ---------- */
.hero {
  padding: 22px 0 26px;
}
.hero-date {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 14px;
}
.hero-greeting {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(30px, 7vw, 44px);
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--text);
  margin: 0 0 4px;
}
.hero-greeting em {
  font-style: italic;
  color: var(--terracotta);
}
.hero-note {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  line-height: 1.55;
  color: var(--text-2);
  margin-top: 16px;
  padding-left: 16px;
  border-left: 2px solid var(--clay);
  max-width: 90%;
}

/* ---------- presence (replaces streak) ---------- */
.presence {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 8px 0 4px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 18px;
}
.presence-bloom {
  flex-shrink: 0;
  width: 42px; height: 42px;
}
.presence-text {
  flex: 1;
  min-width: 0;
}
.presence-count {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  color: var(--terracotta);
  line-height: 1;
}
.presence-count .lbl {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.02em;
  margin-left: 6px;
  font-weight: 400;
}
.presence-sub {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-mute);
  margin-top: 4px;
  line-height: 1.45;
}

/* ---------- welcome-back card ---------- */
.welcome-back {
  margin: 18px 0 6px;
  padding: 20px 20px;
  background: linear-gradient(180deg, var(--rose-soft), transparent);
  border: 1px solid rgba(201,139,139,0.25);
  border-radius: 18px;
  position: relative;
}
.welcome-back h3 {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 21px;
  color: var(--text);
  margin: 0 0 6px;
  letter-spacing: -0.005em;
}
.welcome-back p {
  font-family: var(--body);
  font-size: 14px;
  color: var(--text-2);
  margin: 0;
  line-height: 1.55;
}

/* ---------- card / section ---------- */
.card {
  margin: 18px 0;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 20px;
  overflow: hidden;
}
.card-head {
  padding: 18px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-head-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.card-icon {
  width: 26px; height: 26px;
  flex-shrink: 0;
}
.card-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
  margin: 0;
  letter-spacing: -0.005em;
}
.card-title em { font-style: italic; color: var(--text-2); font-weight: 300; }
.card-tag {
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.card-tag.sage { color: var(--sage); border-color: rgba(138,154,123,0.4); background: var(--sage-soft); }
.card-tag.rose { color: var(--rose); border-color: rgba(201,139,139,0.4); background: var(--rose-soft); }
.card-tag.terra { color: var(--terracotta); border-color: rgba(193,122,84,0.4); background: var(--terra-soft); }
.card-body { padding: 4px 0 8px; }
.card-intro {
  padding: 0 20px 12px;
  font-family: var(--body);
  font-size: 13px;
  color: var(--text-mute);
  line-height: 1.5;
  font-style: italic;
}

/* ---------- soft check item ---------- */
.item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 13px 20px;
  cursor: pointer;
  border-top: 1px solid var(--border-soft);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease;
}
.item:first-child { border-top: none; }
.item:hover { background: rgba(193,122,84,0.03); }

.bud {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg);
  margin-top: 1px;
  position: relative;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bud::after {
  content: '';
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--terracotta);
  transform: scale(0);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.item.checked .bud {
  border-color: var(--terracotta);
  background: var(--terra-soft);
}
.item.checked .bud::after { transform: scale(1); }
.item.checked .item-text { color: var(--text-mute); }
.item.checked .item-text strong { color: var(--text-2); }

.item-main { flex: 1; min-width: 0; padding-top: 1px; }
.item-text {
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.4;
  color: var(--text);
  transition: color 0.2s ease;
}
.item-text strong { font-weight: 600; }
.item-detail {
  font-family: var(--body);
  font-size: 12.5px;
  color: var(--text-mute);
  line-height: 1.5;
  margin-top: 5px;
}

/* sage variant for movement */
.item.move.checked .bud { border-color: var(--sage); background: var(--sage-soft); }
.item.move.checked .bud::after { background: var(--sage); }
/* rose variant for nourish */
.item.nourish.checked .bud { border-color: var(--rose); background: var(--rose-soft); }
.item.nourish.checked .bud::after { background: var(--rose); }

/* ---------- movement window picker ---------- */
.window-row {
  padding: 14px 20px 6px;
}
.window-label {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 10px;
}
.window-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.window-chip {
  flex: 1 1 auto;
  min-width: 0;
  padding: 12px 10px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--bg);
  color: var(--text-2);
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
}
.window-chip small {
  font-size: 9.5px;
  color: var(--text-mute);
  font-weight: 400;
  letter-spacing: 0.02em;
}
.window-chip:hover { border-color: var(--sage); }
.window-chip.active {
  background: var(--sage-soft);
  border-color: var(--sage);
  color: var(--sage);
}
.window-chip.active small { color: var(--sage); opacity: 0.8; }
.window-chip.last-resort.active {
  background: rgba(154,123,138,0.12);
  border-color: var(--plum);
  color: var(--plum);
}

/* ---------- movement menu ---------- */
.move-menu {
  padding: 6px 20px 4px;
}
.move-opt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.move-opt:last-child { border-bottom: none; }
.move-opt-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--sage);
  flex-shrink: 0;
  opacity: 0.6;
}
.move-opt-text {
  font-family: var(--body);
  font-size: 14px;
  color: var(--text);
}
.move-opt-text small {
  display: block;
  font-size: 11.5px;
  color: var(--text-mute);
  margin-top: 2px;
}

/* ---------- permission / let-go card ---------- */
.permission {
  margin: 18px 0;
  padding: 22px 22px;
  background: var(--sage-soft);
  border: 1px solid rgba(138,154,123,0.25);
  border-radius: 20px;
  text-align: center;
}
.permission-sprig {
  width: 34px; height: 34px;
  margin: 0 auto 10px;
  display: block;
}
.permission p {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 18px;
  line-height: 1.5;
  color: var(--text);
  margin: 0;
  letter-spacing: -0.005em;
}
.permission .attribution {
  display: block;
  margin-top: 12px;
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-mute);
  font-style: normal;
}

/* ---------- collapsibles ---------- */
.fold {
  margin: 14px 20px;
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  background: var(--bg);
  overflow: hidden;
}
.fold summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  -webkit-tap-highlight-color: transparent;
}
.fold summary::-webkit-details-marker { display: none; }
.fold-title {
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  font-weight: 600;
}
.fold-chev {
  color: var(--text-mute);
  font-size: 14px;
  transition: transform 0.25s ease;
  font-family: var(--serif);
}
.fold[open] .fold-chev { transform: rotate(90deg); color: var(--terracotta); }
.fold-body {
  padding: 4px 16px 16px;
  border-top: 1px solid var(--border-soft);
  font-family: var(--body);
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.65;
}
.fold-body p { margin: 12px 0; }
.fold-body strong { color: var(--text); font-weight: 600; }
.fold-body .recipe { margin: 14px 0; }
.fold-body .recipe-name {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--terracotta);
  margin-bottom: 4px;
}
.fold-body .recipe-how { font-size: 13px; color: var(--text-2); }

/* ---------- nourish guidance list ---------- */
.nourish-guide {
  padding: 4px 20px 8px;
}
.nourish-principle {
  display: flex;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.nourish-principle:last-child { border-bottom: none; }
.nourish-principle .num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--clay);
  flex-shrink: 0;
  width: 22px;
  line-height: 1.2;
}
.nourish-principle .body {
  flex: 1;
  font-family: var(--body);
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}
.nourish-principle .body small {
  display: block;
  color: var(--text-mute);
  font-size: 12px;
  margin-top: 2px;
}

/* treats callout */
.treats-note {
  margin: 10px 20px 4px;
  padding: 14px 16px;
  background: var(--rose-soft);
  border-radius: 14px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 14.5px;
  color: var(--text-2);
  line-height: 1.55;
}
.treats-note b { color: var(--rose); font-style: normal; font-weight: 500; }

/* ---------- bottom bar ---------- */
.bar {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: rgba(244,239,230,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  z-index: 80;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bar-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 12px var(--pad);
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-done {
  flex: 1;
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--text-mute);
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar-done .seeds {
  display: flex;
  gap: 4px;
}
.bar-seed {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  transition: all 0.3s ease;
}
.bar-seed.filled { background: var(--terracotta); border-color: var(--terracotta); }
.bar-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  height: 38px;
  padding: 0 14px;
  border-radius: 20px;
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bar-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.bar-btn.icon { width: 38px; padding: 0; font-size: 16px; }
.bar-btn.locked { color: var(--text-faint); border-color: var(--border-soft); }
.bar-btn.locked:hover { color: var(--text-faint); border-color: var(--border-soft); }

/* ---------- modal ---------- */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(74,63,53,0.35);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 50px 16px 40px;
  overflow-y: auto;
}
.overlay.open { display: flex; }
.modal {
  width: 100%;
  max-width: 520px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  position: relative;
  margin: auto 0;
  overflow: hidden;
}
.modal-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border-soft);
}
.modal-hd h3 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  margin: 0;
  color: var(--text);
}
.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mute);
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 15px;
  font-family: var(--body);
}
.modal-close:hover { color: var(--terracotta); border-color: var(--terracotta); }
.modal-body { padding: 22px; }
.modal-body .field { margin-bottom: 24px; }
.modal-body .field:last-child { margin-bottom: 0; }
.field-label {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 10px;
}
.opt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.opt-grid button {
  padding: 14px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text-2);
  font-family: var(--body);
  font-size: 13px;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.18s ease;
}
.opt-grid button:hover { border-color: var(--terracotta); color: var(--terracotta); }
.opt-grid button.active {
  background: var(--terra-soft);
  border-color: var(--terracotta);
  color: var(--terracotta);
}
.soft-btn {
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text-2);
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  margin-top: 8px;
}
.soft-btn:hover { border-color: var(--rose); color: var(--rose); }

/* ---------- weekly check (Saturday) ---------- */
.checkin-block { padding: 6px 20px 12px; }
.checkin-field {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.checkin-field:last-of-type { border-bottom: none; }
.checkin-label {
  flex-shrink: 0;
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--text-mute);
  width: 110px;
}
.checkin-field input, .checkin-field textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 9px 12px;
  font-family: var(--body);
  font-size: 13px;
}
.checkin-field input:focus, .checkin-field textarea:focus {
  outline: none;
  border-color: var(--terracotta);
}
.checkin-field textarea {
  resize: vertical; min-height: 46px;
  font-family: var(--serif); font-style: italic; font-size: 14px;
}

/* ---------- reflection (Sunday) ---------- */
.reflect-q { margin-bottom: 18px; }
.reflect-q-label {
  font-family: var(--body);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--text-2);
  margin-bottom: 8px;
  font-weight: 500;
}
.reflect-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.reflect-opt {
  padding: 11px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-2);
  font-family: var(--body);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: center;
}
.reflect-opt:hover { border-color: var(--rose); color: var(--rose); }
.reflect-opt.active { background: var(--rose-soft); border-color: var(--rose); color: var(--rose); }
.reflect-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  padding: 12px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  resize: vertical;
  min-height: 56px;
}
.reflect-input:focus { outline: none; border-color: var(--rose); }
.reflect-submit {
  margin-top: 14px;
  width: 100%;
  padding: 14px;
  background: var(--terracotta);
  border: none;
  border-radius: 14px;
  color: var(--surface);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  cursor: pointer;
}
.reflect-submit:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }
.reflect-done {
  padding: 8px 0;
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  color: var(--text-2);
  line-height: 1.55;
}
.reflect-done b { color: var(--terracotta); font-style: normal; font-weight: 500; }

.reflect-card, .checkin-card {
  margin: 18px 0;
  border-radius: 20px;
  overflow: hidden;
}
.reflect-card { border: 1px solid rgba(201,139,139,0.3); background: linear-gradient(180deg, var(--rose-soft), transparent); }
.checkin-card { border: 1px solid var(--border-soft); background: var(--surface); }

/* ---------- progress / charts ---------- */
.modal--progress { max-width: 560px; }
.chart-block { margin-bottom: 26px; }
.chart-block:last-child { margin-bottom: 0; }
.chart-hd {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--terracotta);
  margin-bottom: 4px;
}
.chart-now {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
}
.chart-now .unit { font-family: var(--body); font-size: 12px; color: var(--text-mute); margin-left: 4px; }
.chart-now .delta { font-family: var(--body); font-size: 12px; margin-left: 10px; letter-spacing: 0.04em; }
.chart-now .delta.good { color: var(--sage); }
.chart-now .delta.flat { color: var(--text-mute); }
.chart-svg-wrap {
  margin-top: 10px;
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 14px 12px 6px;
}
.chart-svg-wrap svg { display: block; width: 100%; height: 130px; }
.chart-svg-wrap svg text { font-family: var(--body); font-size: 7px; fill: var(--text-mute); }
.chart-empty {
  padding: 18px; text-align: center;
  font-family: var(--serif); font-style: italic;
  font-size: 15px; color: var(--text-mute); line-height: 1.5;
}
.showing-up {
  display: flex; gap: 5px; align-items: flex-end;
  height: 70px; padding: 4px 2px 0;
}
.su-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.su-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--sage); min-height: 3px; opacity: 0.85; }
.su-label { font-family: var(--body); font-size: 8px; color: var(--text-mute); }
.su-count { font-family: var(--body); font-size: 9px; color: var(--text-2); font-weight: 600; }
.journal-log { list-style: none; padding: 0; margin: 0; }
.journal-entry { padding: 11px 0; border-bottom: 1px dashed var(--border-soft); }
.journal-entry:last-child { border-bottom: none; }
.journal-date { font-family: var(--body); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mute); margin-bottom: 3px; }
.journal-text { font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--text-2); line-height: 1.5; }

/* ---------- toast ---------- */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface);
  border: 1px solid var(--clay);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 30px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  z-index: 90;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(74,63,53,0.10);
  max-width: 80%;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- complete bloom ---------- */
.bloom-complete {
  margin: 22px 0;
  padding: 26px 22px;
  text-align: center;
  background: linear-gradient(180deg, var(--terra-soft), transparent);
  border: 1px solid rgba(193,122,84,0.25);
  border-radius: 22px;
}
.bloom-complete svg { width: 48px; height: 48px; margin: 0 auto 8px; display: block; }
.bloom-complete h3 {
  font-family: var(--serif);
  font-style: italic;
  font-size: 24px;
  font-weight: 400;
  color: var(--terracotta);
  margin: 0 0 6px;
}
.bloom-complete p {
  font-family: var(--body);
  font-size: 13px;
  color: var(--text-2);
  margin: 0;
  line-height: 1.5;
}

.foot {
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--text-faint);
  padding: 30px 16px 16px;
  line-height: 1.6;
}

@media (max-width: 480px) {
  body { font-size: 14px; }
  .hero-note { max-width: 100%; }
  .opt-grid { grid-template-columns: 1fr; }
  .window-chips { gap: 6px; }
  .reflect-grid { grid-template-columns: 1fr; }
  .checkin-label { width: 90px; }
}

/* ============================================================
   SLEEP GATE — first decision of the day
   ============================================================ */
.sleep-gate {
  margin: 18px 0;
  padding: 22px 22px 20px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 20px;
}
.sleep-gate-q {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 22px;
  line-height: 1.35;
  color: var(--text);
  margin: 0 0 6px;
}
.sleep-gate-sub {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-mute);
  margin-bottom: 18px;
  line-height: 1.5;
}
.sleep-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.sleep-option {
  padding: 14px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.sleep-option:hover { border-color: var(--terracotta); }
.sleep-option-label {
  font-family: var(--serif);
  font-size: 15px;
  color: var(--text);
  font-weight: 400;
  margin-bottom: 3px;
}
.sleep-option-sub {
  font-family: var(--body);
  font-size: 10.5px;
  color: var(--text-mute);
  letter-spacing: 0.02em;
  line-height: 1.35;
}
.sleep-option.full { grid-column: span 2; }

/* Sleep status pill (after she's chosen) */
.sleep-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 16px;
  margin: 14px 0 4px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-left: 3px solid var(--terracotta);
  border-radius: 14px;
}
.sleep-status.rested { border-left-color: var(--sage); }
.sleep-status.tired-mode { border-left-color: var(--clay); }
.sleep-status.rest-mode { border-left-color: var(--rose); }
.sleep-status.off-mode { border-left-color: var(--plum); }
.sleep-status-text {
  font-family: var(--body);
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.4;
}
.sleep-status-text b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--terracotta);
}
.sleep-status.rested b { color: var(--sage); }
.sleep-status.rest-mode b { color: var(--rose); }
.sleep-status.off-mode b { color: var(--plum); }
.sleep-status button {
  font-family: var(--body);
  font-size: 11px;
  color: var(--text-mute);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.sleep-status button:hover { color: var(--terracotta); border-color: var(--terracotta); }

/* ============================================================
   WORKOUT PRESCRIPTION CARD — duration + activity, based on sleep
   ============================================================ */
.workout-prescription {
  padding: 16px 20px 12px;
  background: linear-gradient(180deg, var(--sage-soft), transparent);
  border-bottom: 1px solid var(--border-soft);
}
.workout-prescription.rest { background: linear-gradient(180deg, var(--rose-soft), transparent); }
.workout-prescription.off  { background: linear-gradient(180deg, rgba(154,123,138,0.08), transparent); }
.wp-label {
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 6px;
}
.wp-duration {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--sage);
  letter-spacing: -0.01em;
  line-height: 1;
}
.workout-prescription.rest .wp-duration { color: var(--rose); }
.workout-prescription.off .wp-duration { color: var(--plum); font-style: italic; font-size: 22px; }
.wp-duration .unit {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-mute);
  margin-left: 4px;
  letter-spacing: 0.06em;
}
.wp-guidance {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--text-2);
  margin-top: 8px;
  line-height: 1.5;
}

/* ============================================================
   MEAL CARDS — breakfast/lunch/dinner/snack/treat with calories
   ============================================================ */
.meal-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 14px 20px;
  border-top: 1px solid var(--border-soft);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease;
}
.meal-item:first-child { border-top: none; }
.meal-item:hover { background: rgba(193,122,84,0.03); }
.meal-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.meal-label {
  flex-shrink: 0;
  width: 64px;
  padding-top: 1px;
}
.meal-label-name {
  font-family: var(--body);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--terracotta);
  font-weight: 600;
}
.meal-label-cal {
  font-family: var(--serif);
  font-style: italic;
  font-size: 11px;
  color: var(--text-mute);
  margin-top: 2px;
}
.meal-pick {
  flex: 1;
  min-width: 0;
}
.meal-pick-name {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--text);
  line-height: 1.35;
}
.meal-pick-name.placeholder {
  font-style: italic;
  color: var(--text-mute);
  font-size: 14px;
}
.meal-pick-note {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-mute);
  margin-top: 3px;
  line-height: 1.45;
}
.meal-actions {
  margin-top: 8px;
  margin-left: 76px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.meal-action {
  padding: 7px 11px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text-2);
  font-family: var(--body);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.meal-action:hover { border-color: var(--rose); color: var(--rose); }
.meal-action.active {
  background: var(--rose-soft);
  border-color: var(--rose);
  color: var(--rose);
}
.meal-action.clear { color: var(--text-mute); }
.meal-action.recipe { color: var(--terracotta); border-color: rgba(193,122,84,0.3); }
.meal-action.recipe:hover { background: var(--terra-soft); }

/* ============================================================
   CALORIE TRACKER
   ============================================================ */
.cal-tracker {
  padding: 14px 20px 16px;
  border-top: 1px solid var(--border-soft);
  background: var(--surface-2);
}
.cal-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.cal-eaten {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.01em;
}
.cal-eaten .of {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-mute);
  letter-spacing: 0.02em;
  margin: 0 4px;
}
.cal-eaten .target {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--text-2);
}
.cal-remaining {
  font-family: var(--body);
  font-size: 12px;
  color: var(--sage);
  font-weight: 500;
  text-align: right;
  letter-spacing: 0.02em;
}
.cal-remaining.over { color: var(--clay); }
.cal-bar {
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 10px;
}
.cal-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), var(--terracotta));
  width: 0%;
  transition: width 0.4s ease;
  border-radius: 3px;
}
.cal-bar-fill.over { background: linear-gradient(90deg, var(--terracotta), var(--clay)); }
.cal-target-note {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--text-mute);
  line-height: 1.5;
  margin-bottom: 10px;
}
.cal-add {
  display: flex;
  gap: 6px;
  align-items: center;
}
.cal-add input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: var(--body);
  font-size: 13px;
  color: var(--text);
}
.cal-add input:focus { outline: none; border-color: var(--terracotta); }
.cal-add button {
  padding: 8px 14px;
  background: var(--terracotta);
  border: none;
  border-radius: 10px;
  color: var(--surface);
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.04em;
  cursor: pointer;
}
.cal-add button:hover { opacity: 0.92; }
.cal-manual-log {
  margin-top: 10px;
  font-family: var(--body);
  font-size: 11px;
  color: var(--text-mute);
  line-height: 1.55;
}
.cal-manual-log .entry {
  display: inline-block;
  margin: 2px 4px 2px 0;
  padding: 2px 8px;
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  cursor: pointer;
}
.cal-manual-log .entry:hover { border-color: var(--clay); color: var(--clay); }

/* ============================================================
   MEAL PICKER MODAL — shows recipe options for a given slot
   ============================================================ */
.meal-picker { max-height: none; }
.recipe-card {
  margin-bottom: 12px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  transition: border-color 0.15s ease;
}
.recipe-card:hover { border-color: var(--clay); }
.recipe-card.selected { border-color: var(--terracotta); background: var(--terra-soft); }
.recipe-card-hd {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
}
.recipe-card-name {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--text);
  font-weight: 400;
  line-height: 1.3;
}
.recipe-card-cal {
  flex-shrink: 0;
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--text-mute);
  font-weight: 500;
}
.recipe-card-note {
  font-family: var(--body);
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.55;
  margin-bottom: 8px;
}
.recipe-card-from {
  font-family: var(--serif);
  font-style: italic;
  font-size: 11.5px;
  color: var(--clay);
  margin-bottom: 8px;
}
.recipe-card-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.recipe-pick-btn {
  flex: 1;
  padding: 9px 14px;
  background: var(--terracotta);
  border: none;
  border-radius: 10px;
  color: var(--surface);
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.06em;
  cursor: pointer;
  font-weight: 500;
}
.recipe-pick-btn:hover { opacity: 0.92; }
.recipe-pick-btn.selected { background: var(--sage); }
.recipe-search-btn {
  padding: 9px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-2);
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.04em;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}
.recipe-search-btn:hover { border-color: var(--clay); color: var(--clay); }

.picker-header {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--text-2);
  margin-bottom: 14px;
  line-height: 1.5;
}

/* freeform-meal entry */
.freeform-meal {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: 12px;
}
.freeform-meal-label {
  font-family: var(--body);
  font-size: 11px;
  color: var(--text-mute);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.freeform-meal-row {
  display: flex;
  gap: 6px;
}
.freeform-meal-row input.name {
  flex: 2;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;

<script>
/* ============================================================
   BLOOM — a gentle return
   Elizabeth's companion. Built to nurture, never to nag.
   Core inversion vs. a streak app: this NEVER punishes a miss.
   It counts showing up (only goes up) and welcomes her back.
   ============================================================ */

const STORE_KEY = 'bloom_v1';
const DAY_NAMES = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_DISPLAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function keyFromDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayName() { return DAY_NAMES[new Date().getDay()]; }

/* ============================================================
   STORE
   ============================================================ */
function defaultStore() {
  return {
    history: {},          // 'YYYY-MM-DD': { sleep, workoutWindow, workoutActivity, meals:{}, calsManual:[], checks:{}, feel, note }
    weekly: {},
    reflections: {},
    settings: {
      units: 'imperial',
      travel: false,
      startDate: null,
    },
    lastOpen: null,
    showingUpTotal: 0,
    countedDays: {},
  };
}
function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultStore();
    return Object.assign(defaultStore(), JSON.parse(raw));
  } catch (e) { return defaultStore(); }
}
function saveStore() { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }
let store = loadStore();

// Backfill
if (!store.settings.startDate) store.settings.startDate = todayKey();
if (typeof store.showingUpTotal !== 'number') store.showingUpTotal = 0;
if (!store.countedDays) store.countedDays = {};
if (!store.reflections) store.reflections = {};
if (!store.weekly) store.weekly = {};

function getToday() {
  const k = todayKey();
  if (!store.history[k]) {
    store.history[k] = {
      sleep: null,             // 'rested' | 'tired' | 'recovery' | 'off'
      workoutWindow: null,     // 'morning' | 'help' | 'nap' | 'bedtime'
      workoutActivity: null,   // id from ACTIVITIES
      workoutDone: false,
      meals: {},               // { breakfast: {id,name,cal}, lunch: {...}, ... }
      calsManual: [],          // [{ name, cal }, ...]
      checks: {},
      feel: null,
      note: '',
    };
  }
  // Backfill for older days that don't have new fields
  const d = store.history[k];
  if (!d.meals) d.meals = {};
  if (!d.calsManual) d.calsManual = [];
  if (!d.checks) d.checks = {};
  return d;
}

/* ============================================================
   WEEK MATH
   ============================================================ */
function isoWeekStart(dateOrKey) {
  const d = (typeof dateOrKey === 'string') ? new Date(dateOrKey + 'T12:00:00') : new Date(dateOrKey.getTime());
  d.setHours(0,0,0,0);
  const dow = d.getDay();
  const sinceMon = (dow === 0) ? 6 : (dow - 1);
  d.setDate(d.getDate() - sinceMon);
  return keyFromDate(d);
}
function lastNWeeks(n) {
  const out = [];
  let cur = new Date();
  for (let i = 0; i < n; i++) { out.unshift(isoWeekStart(cur)); cur = new Date(cur.getTime() - 7*86400000); }
  return [...new Set(out)];
}
function prettyDate(d) {
  return DAY_DISPLAY[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
}

/* ============================================================
   PRESENCE — the gentle engine
   "Showing up" = chose a movement window OR logged any movement
   OR nourished. The lightest possible bar. It only ever counts UP.
   ============================================================ */
function showedUpToday() {
  const t = getToday();
  if (t.sleep) return true;
  if (t.workoutWindow) return true;
  if (t.workoutActivity) return true;
  if (t.workoutDone) return true;
  if (t.meals && Object.keys(t.meals).length > 0) return true;
  if (t.calsManual && t.calsManual.length > 0) return true;
  if (t.checks && Object.values(t.checks).some(Boolean)) return true;
  if (t.feel) return true;
  return false;
}

// Count today exactly once, ever. Never decrements.
function maybeCountToday() {
  const k = todayKey();
  if (!store.countedDays[k] && showedUpToday()) {
    store.countedDays[k] = true;
    store.showingUpTotal = (store.showingUpTotal || 0) + 1;
    saveStore();
  }
}

// Days since she last opened — for warm welcome-back (never guilt)
function daysSinceLastOpen() {
  if (!store.lastOpen) return 0;
  const last = new Date(store.lastOpen + 'T12:00:00');
  const now = new Date(todayKey() + 'T12:00:00');
  return Math.round((now - last) / 86400000);
}

/* ============================================================
   ELEMENT HELPER
   ============================================================ */
function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'dataset') Object.assign(e.dataset, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of kids) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function renderCalorieTracker() {
  const t = getToday();
  const sleepMode = t.sleep && CAL_TARGETS[t.sleep] ? t.sleep : 'rested';
  const tgt = CAL_TARGETS[sleepMode];

  // Sum eaten from meals + manual
  let eaten = 0;
  Object.values(t.meals || {}).forEach(m => { if (m && typeof m.cal === 'number') eaten += m.cal; });
  (t.calsManual || []).forEach(c => { eaten += c.cal; });

  const remaining = tgt.target - eaten;
  const overBy = -remaining;
  const pct = Math.min(100, Math.max(0, (eaten / tgt.target) * 100));

  const wrap = el('div', { class: 'cal-tracker' });

  const row = el('div', { class: 'cal-row' });
  const eaten_el = el('div', { class: 'cal-eaten' });
  eaten_el.innerHTML = eaten + '<span class="of">of</span><span class="target">' + tgt.target + '</span>';
  row.appendChild(eaten_el);
  const rem_el = el('div', { class: 'cal-remaining' + (remaining < 0 ? ' over' : '') },
    remaining >= 0 ? (remaining + ' left') : ('over by ' + overBy));
  row.appendChild(rem_el);
  wrap.appendChild(row);

  const bar = el('div', { class: 'cal-bar' });
  const fill = el('div', { class: 'cal-bar-fill' + (remaining < 0 ? ' over' : '') });
  fill.style.width = pct + '%';
  bar.appendChild(fill);
  wrap.appendChild(bar);

  let sleepLabel;
  if (sleepMode === 'rested') sleepLabel = 'On a rested day';
  else if (sleepMode === 'tired') sleepLabel = 'On a tired day';
  else if (sleepMode === 'recovery') sleepLabel = 'On a recovery day';
  else sleepLabel = 'On a rest day';
  wrap.appendChild(el('div', { class: 'cal-target-note' },
    sleepLabel + ': aim for ' + tgt.range + '. ' + tgt.note));

  // Add manual calories
  const addRow = el('div', { class: 'cal-add' });
  const nameInput = document.createElement('input');
  nameInput.placeholder = 'e.g. handful of nuts';
  nameInput.style.flex = '2';
  const calInput = document.createElement('input');
  calInput.type = 'number';
  calInput.placeholder = 'cal';
  calInput.style.maxWidth = '70px';
  calInput.style.flex = '1';
  const addBtn = el('button', {
    onclick: () => {
      const nm = nameInput.value.trim() || 'something';
      const cl = parseInt(calInput.value, 10);
      if (!cl || isNaN(cl)) { showToast('Add a calorie estimate'); return; }
      t.calsManual.push({ name: nm, cal: cl });
      saveStore(); maybeCountToday(); render();
    }
  }, 'add');
  addRow.appendChild(nameInput);
  addRow.appendChild(calInput);
  addRow.appendChild(addBtn);
  wrap.appendChild(addRow);

  // Manual log (tap to remove)
  if ((t.calsManual || []).length > 0) {
    const log = el('div', { class: 'cal-manual-log' });
    log.appendChild(el('span', { style: 'margin-right:6px;color:var(--text-mute);' }, 'Added:'));
    t.calsManual.forEach((c, idx) => {
      const ent = el('span', {
        class: 'entry',
        title: 'tap to remove',
        onclick: () => { t.calsManual.splice(idx, 1); saveStore(); render(); }
      }, c.name + ' · ' + c.cal + ' cal');
      log.appendChild(ent);
    });
    wrap.appendChild(log);
  }

  return wrap;
}

function openMealPicker(slotId) {
  const slot = MEAL_SLOTS.find(s => s.id === slotId);
  document.getElementById('meal-picker-title').textContent = slot.label;
  const body = document.getElementById('meal-body');
  body.innerHTML = '';
  body.appendChild(el('div', { class: 'picker-header' },
    slotId === 'treat'
      ? 'Treats are part of a good life, not a break from one. Pick what fits today — or skip.'
      : 'Tap to pick. Tap the recipe link to open search for the full how-to.'));

  const t = getToday();
  const chosen = t.meals[slotId];
  const options = MEALS[slotId] || [];

  options.forEach(opt => {
    const card = el('div', { class: 'recipe-card' + (chosen && chosen.id === opt.id ? ' selected' : '') });
    const hd = el('div', { class: 'recipe-card-hd' });
    hd.appendChild(el('div', { class: 'recipe-card-name' }, opt.name));
    if (opt.cal != null && opt.cal > 0) hd.appendChild(el('div', { class: 'recipe-card-cal' }, '~' + opt.cal + ' cal'));
    card.appendChild(hd);
    if (opt.note) card.appendChild(el('div', { class: 'recipe-card-note' }, opt.note));
    if (opt.from) card.appendChild(el('div', { class: 'recipe-card-from' }, 'from: ' + opt.from));
    const acts = el('div', { class: 'recipe-card-actions' });
    const pickBtn = el('button', {
      class: 'recipe-pick-btn' + (chosen && chosen.id === opt.id ? ' selected' : ''),
      onclick: () => {
        if (chosen && chosen.id === opt.id) {
          delete t.meals[slotId];
        } else {
          t.meals[slotId] = { id: opt.id, name: opt.name, cal: opt.cal, note: opt.note };
        }
        saveStore(); maybeCountToday(); closeMealPicker(); render();
      }
    }, (chosen && chosen.id === opt.id) ? '✓ chosen' : 'pick this');
    acts.appendChild(pickBtn);
    if (opt.from) {
      const q = encodeURIComponent(opt.from + ' ' + opt.name);
      const searchA = document.createElement('a');
      searchA.className = 'recipe-search-btn';
      searchA.href = 'https://www.google.com/search?q=' + q;
      searchA.target = '_blank';
      searchA.rel = 'noopener noreferrer';
      searchA.textContent = 'find recipe →';
      acts.appendChild(searchA);
    }
    card.appendChild(acts);
    body.appendChild(card);
  });

  // Freeform entry
  const ff = el('div', { class: 'freeform-meal' });
  ff.appendChild(el('div', { class: 'freeform-meal-label' }, 'Or, log your own:'));
  const row = el('div', { class: 'freeform-meal-row' });
  const nameI = document.createElement('input');
  nameI.className = 'name';
  nameI.placeholder = 'what you ate';
  const calI = document.createElement('input');
  calI.className = 'cal';
  calI.type = 'number';
  calI.placeholder = 'cal';
  const saveBtn = el('button', {
    onclick: () => {
      const nm = nameI.value.trim();
      const cl = parseInt(calI.value, 10);
      if (!nm) { showToast('Add a name'); return; }
      t.meals[slotId] = { id: 'custom', name: nm, cal: isNaN(cl) ? 0 : cl };
      saveStore(); maybeCountToday(); closeMealPicker(); render();
    }
  }, 'save');
  row.appendChild(nameI); row.appendChild(calI); row.appendChild(saveBtn);
  ff.appendChild(row);
  body.appendChild(ff);

  // Clear option
  if (chosen) {
    const clearBtn = el('button', {
      class: 'soft-btn',
      style: 'margin-top:14px;',
      onclick: () => { delete t.meals[slotId]; saveStore(); closeMealPicker(); render(); }
    }, 'Clear this slot');
    body.appendChild(clearBtn);
  }

  document.getElementById('modal-meal').classList.add('open');
}

   SATURDAY CHECK-IN — weight (hidden in progress), strength, feel, journal
   ============================================================ */
function renderCheckin() {
  if (dayName() !== 'saturday') return null;
  const wk = isoWeekStart(new Date());
  const data = (store.weekly && store.weekly[wk]) || {};
  const card = el('div', { class: 'card checkin-card' });
  card.appendChild(el('div', { class: 'card-head' },
    el('div', { class: 'card-head-left', html: SPRIG_SVG + '<h2 class="card-title">A gentle check-in</h2>' }),
    el('div', { class: 'card-tag' }, 'Saturday')
  ));
  card.appendChild(el('div', { class: 'card-intro' }, 'Only if you want to. These live privately in your bloom — never on the home screen.'));

  const block = el('div', { class: 'checkin-block' });
  const units = store.settings.units === 'metric' ? 'kg' : 'lb';

  function field(label, key, type, placeholder) {
    const row = el('div', { class: 'checkin-field' });
    row.appendChild(el('div', { class: 'checkin-label' }, label));
    const tag = type === 'text' ? 'textarea' : 'input';
    const input = document.createElement(tag);
    input.className = 'reflect-input';
    if (type !== 'text') { input.type = type; input.style.fontStyle = 'normal'; input.style.fontFamily = 'var(--body)'; }
    if (placeholder) input.placeholder = placeholder;
    input.style.padding = '9px 12px';
    input.value = data[key] != null ? data[key] : '';
    if (type === 'text') { input.style.minHeight = '40px'; input.style.resize = 'vertical'; }
    input.addEventListener('change', () => {
      if (!store.weekly[wk]) store.weekly[wk] = {};
      const v = input.value.trim();
      if (v === '') delete store.weekly[wk][key];
      else store.weekly[wk][key] = (type === 'number') ? parseFloat(v) : v;
      saveStore();
    });
    row.appendChild(input);
    return row;
  }

  block.appendChild(field('Weight (' + units + ')', 'weight', 'number', 'optional'));
  block.appendChild(field('Feeling stronger?', 'strength', 'text', 'e.g. carried both girls up the stairs'));
  block.appendChild(field('How\'s your spirit?', 'feel', 'text', 'one honest line'));
  block.appendChild(field('A small win', 'journal', 'text', 'anything that made you smile'));
  card.appendChild(block);
  return card;
}

function renderReflection() {
  if (dayName() !== 'sunday') return null;
  const hour = new Date().getHours();
  if (hour < 12) return null;

  const sKey = todayKey();
  const existing = store.reflections[sKey];
  const card = el('div', { class: 'card reflect-card' });
  card.appendChild(el('div', { class: 'card-head' },
    el('div', { class: 'card-head-left', html: SPRIG_SVG + '<h2 class="card-title">Sunday, softly</h2>' }),
    el('div', { class: 'card-tag' }, 'a gentle look back')
  ));

  const body = el('div', { style: 'padding:6px 20px 18px;' });

  if (existing && existing.completedAt) {
    body.appendChild(el('div', { class: 'reflect-done', html:
      'Reflected, with kindness.<br>One joy you named:<br>"' + (existing.oneJoy || '—') + '"' }));
    card.appendChild(body);
    return card;
  }

  card.appendChild(el('div', { class: 'card-intro' }, 'Not a report card. Just three soft questions, then you\'ll unlock your bloom.'));
  if (!card._a) card._a = { kindToSelf: null, energy: null, oneJoy: '' };

  function q(label, key, opts) {
    const w = el('div', { class: 'reflect-q' });
    w.appendChild(el('div', { class: 'reflect-q-label' }, label));
    const grid = el('div', { class: 'reflect-grid' });
    opts.forEach(o => {
      const b = el('div', {
        class: 'reflect-opt' + (card._a[key] === o ? ' active' : ''),
        onclick: () => {
          card._a[key] = o;
          w.querySelectorAll('.reflect-opt').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          sync();
        }
      }, o);
      grid.appendChild(b);
    });
    w.appendChild(grid);
    return w;
  }

  body.appendChild(q('Were you kind to yourself this week?', 'kindToSelf', ['Mostly', 'Some', 'I tried']));
  body.appendChild(q('How was your energy?', 'energy', ['Steady', 'Up & down', 'Depleted']));

  const jq = el('div', { class: 'reflect-q' });
  jq.appendChild(el('div', { class: 'reflect-q-label' }, 'One small joy from the week'));
  const ta = document.createElement('textarea');
  ta.className = 'reflect-input';
  ta.placeholder = 'a nap, a ride, Ava\'s laugh, a quiet moment…';
  ta.addEventListener('input', () => { card._a.oneJoy = ta.value; sync(); });
  jq.appendChild(ta);
  body.appendChild(jq);

  const submit = el('button', { class: 'reflect-submit', disabled: 'disabled' }, 'Close the week gently');
  function sync() {
    const a = card._a;
    const ready = a.kindToSelf && a.energy && a.oneJoy.trim().length > 0;
    if (ready) submit.removeAttribute('disabled'); else submit.setAttribute('disabled','disabled');
  }
  submit.addEventListener('click', () => {
    store.reflections[sKey] = { ...card._a, oneJoy: card._a.oneJoy.trim(), completedAt: new Date().toISOString() };
    saveStore();
    render();
    showToast('Your bloom is open. Go see how far you\'ve come.');
  });
  body.appendChild(submit);
  card.appendChild(body);
  return card;
}

  if (wb) content.appendChild(wb);

  // 2. Sunday reflection (if applicable)
  const reflection = renderReflection();
  if (reflection) content.appendChild(reflection);

  content.appendChild(renderPresence());

/* ============================================================
   BOTTOM BAR — soft "today" indicator (NOT a score)
   Shows seeds for the gentle things touched today. Never red.
   ============================================================ */
function updateBar() {
  const t = getToday();
  // Count touches across the day's pillars
  const touched = [
    !!t.sleep,
    !!t.workoutWindow,
    !!t.workoutActivity || !!t.workoutDone,
    !!t.meals['breakfast'],
    !!t.meals['lunch'],
    !!t.meals['dinner'],
  ];
  const seeds = document.getElementById('bar-seeds');
  if (seeds) {
    seeds.innerHTML = '';
    touched.forEach(on => {
      const s = el('div', { class: 'bar-seed' + (on ? ' filled' : '') });
      seeds.appendChild(s);
    });
  }
  const txt = document.getElementById('bar-done-text');
  if (txt) {
    const n = touched.filter(Boolean).length;
    if (n === 0) txt.textContent = 'a soft start';
    else if (n <= 2) txt.textContent = 'you\'ve begun';
    else if (n <= 4) txt.textContent = 'lovely momentum';
    else txt.textContent = 'a full day, beautifully';
  }
}

function buildKindChart(title, series, unit) {
  const blk = el('div', { class: 'chart-block' });
  blk.appendChild(el('div', { class: 'chart-hd' }, title));
  const latest = series[series.length - 1].v;
  const first = series[0].v;
  const delta = latest - first;
  const now = el('div', { class: 'chart-now' });
  now.innerHTML = latest.toFixed(1) + '<span class="unit">' + unit + '</span>';
  if (series.length > 1 && Math.abs(delta) >= 0.1) {
    const cls = delta < 0 ? 'good' : 'flat';
    now.innerHTML += '<span class="delta ' + cls + '">' + (delta < 0 ? '↓ ' : '') + Math.abs(delta).toFixed(1) + ' since the start</span>';
  }
  blk.appendChild(now);
  blk.appendChild(el('div', { style: 'font-family:var(--serif);font-style:italic;font-size:13px;color:var(--text-mute);margin-top:2px;' },
    'Slowly is the point. Your body is still doing the work of feeding Ana.'));

  if (series.length >= 2) {
    const wrap = el('div', { class: 'chart-svg-wrap' });
    const n = series.length;
    const vals = series.map(s => s.v);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const W = 100, H = 100, padX = 8, padY = 12;
    const pts = series.map((s, i) => {
      const x = padX + (i/(n-1))*(W - 2*padX);
      const y = padY + (1 - (s.v - min)/range)*(H - 2*padY);
      return [x, y];
    });
    let pathD = 'M ' + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L ');
    let areaD = pathD + ' L ' + pts[n-1][0].toFixed(1) + ' ' + H + ' L ' + pts[0][0].toFixed(1) + ' ' + H + ' Z';
    let svg = '';
    series.forEach((s,i) => { svg += '<text x="' + pts[i][0].toFixed(1) + '" y="' + (H+2) + '" text-anchor="middle" dominant-baseline="hanging">' + s.label + '</text>'; });
    svg += '<path d="' + areaD + '" fill="var(--rose)" opacity="0.08" />';
    svg += '<path d="' + pathD + '" fill="none" stroke="var(--rose)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />';
    pts.forEach(p => { svg += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="2.4" fill="var(--rose)" />'; });
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + (H+12));
    svgEl.setAttribute('preserveAspectRatio', 'none');
    svgEl.innerHTML = svg;
    wrap.appendChild(svgEl);
    blk.appendChild(wrap);
  }
  return blk;
}

    const c = el('div', { style: 'padding:14px 16px;border:1px solid var(--border-soft);border-left:2px solid var(--rose);border-radius:14px;background:var(--surface);margin-bottom:10px;' });
    c.appendChild(el('div', { style: 'font-family:var(--body);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--clay);margin-bottom:6px;' }, a.name));
    c.appendChild(el('div', { style: 'font-family:var(--serif);font-size:16px;font-weight:300;line-height:1.5;color:var(--text);' }, a.text));
    s1.appendChild(c);
  });
  body.appendChild(s1);

  // Reminders
  const s2 = el('div', { style: 'margin-bottom:26px;' });
  s2.appendChild(el('div', { style: 'font-family:var(--body);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--terracotta);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);' }, 'Gentle reminders'));
  HER_REMINDERS.forEach((line, i) => {
    const row = el('div', { style: 'display:flex;gap:12px;padding:8px 0;border-bottom:1px dashed var(--border-soft);' });
    row.appendChild(el('div', { class: 'permission-sprig', style: 'width:16px;height:16px;margin:2px 0 0;flex-shrink:0;', html:
      '<svg viewBox="0 0 24 24" fill="none" stroke="#8a9a7b" stroke-width="1.6" stroke-linecap="round"><path d="M5 12 L10 17 L19 7"/></svg>' }));
    row.appendChild(el('div', { style: 'font-family:var(--body);font-size:14px;color:var(--text);line-height:1.5;' }, line));
    s2.appendChild(row);
  });
  body.appendChild(s2);

  // Quotes
  const s3 = el('div', null);
  s3.appendChild(el('div', { style: 'font-family:var(--body);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--terracotta);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);' }, 'To carry with you'));
  HER_QUOTES.forEach(q => {
    const block = el('div', { style: 'margin-bottom:16px;padding:0 0 0 14px;border-left:2px solid var(--border);' });
    block.appendChild(el('div', { style: 'font-family:var(--serif);font-style:italic;font-weight:300;font-size:16px;line-height:1.5;color:var(--text);' }, '“' + q.text + '”'));
    const attr = el('div', { style: 'margin-top:6px;font-family:var(--body);font-size:11px;letter-spacing:0.08em;color:var(--text-mute);' });
    attr.innerHTML = '— ' + q.author + (q.src ? ' <span style="font-style:italic;">· ' + q.src + '</span>' : '');
    block.appendChild(attr);
    s3.appendChild(block);
  });
  body.appendChild(s3);
}

function openGather() { renderGather(); document.getElementById('modal-gather').classList.add('open'); }
function closeGather() { document.getElementById('modal-gather').classList.remove('open'); }

/* ============================================================
   SETTINGS
   ============================================================ */
function openSettings() { document.getElementById('modal-settings').classList.add('open'); syncSettings(); }
function closeSettings() { document.getElementById('modal-settings').classList.remove('open'); }
function syncSettings() {
  document.querySelectorAll('#opt-units button').forEach(b => b.classList.toggle('active', b.dataset.val === store.settings.units));
  document.querySelectorAll('#opt-travel button').forEach(b => b.classList.toggle('active', (b.dataset.val === 'on') === !!store.settings.travel));
}

document.getElementById('btn-settings').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
document.getElementById('modal-settings').addEventListener('click', e => { if (e.target.id === 'modal-settings') closeSettings(); });

document.querySelectorAll('#opt-units button').forEach(b => b.addEventListener('click', () => {
  store.settings.units = b.dataset.val; saveStore(); syncSettings();
}));
document.querySelectorAll('#opt-travel button').forEach(b => b.addEventListener('click', () => {
  store.settings.travel = (b.dataset.val === 'on'); saveStore(); syncSettings(); render();
}));

document.getElementById('btn-reset-today').addEventListener('click', () => {
  if (!confirm('Clear just today and begin again? Your showing-up count stays — it never goes backward.')) return;
  const k = todayKey();
  // Clearing today's actions does NOT decrement showingUpTotal (it only ever goes up)
  store.history[k] = { sleep: null, workoutWindow: null, workoutActivity: null, workoutDone: false, meals: {}, calsManual: [], checks: {}, feel: null, note: '' };
  saveStore(); closeSettings(); render(); showToast('A fresh start for today');
});
document.getElementById('btn-reset-all').addEventListener('click', () => {
  if (!confirm('Erase everything — all history, weeks, and your bloom? This can\'t be undone.')) return;
  if (!confirm('Are you sure? This is permanent.')) return;
  localStorage.removeItem(STORE_KEY);
  store = defaultStore();
  store.settings.startDate = todayKey();
  saveStore(); closeSettings(); render(); showToast('Everything cleared. A clean beginning.');
});

/* ============================================================
   BLOOM / GATHER button wiring
   ============================================================ */
document.getElementById('btn-progress').addEventListener('click', openBloom);
document.getElementById('progress-close').addEventListener('click', closeBloom);
document.getElementById('modal-progress').addEventListener('click', e => { if (e.target.id === 'modal-progress') closeBloom(); });

document.getElementById('btn-gather').addEventListener('click', openGather);
document.getElementById('gather-close').addEventListener('click', closeGather);
document.getElementById('modal-gather').addEventListener('click', e => { if (e.target.id === 'modal-gather') closeGather(); });

document.getElementById('meal-close').addEventListener('click', closeMealPicker);
document.getElementById('modal-meal').addEventListener('click', e => { if (e.target.id === 'modal-meal') closeMealPicker(); });

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') { closeSettings(); closeGather(); closeBloom(); closeMealPicker(); }
});

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============================================================
   DAY WATCH
   ============================================================ */
let lastDay = todayKey();
setInterval(() => {
  const now = todayKey();
  if (now !== lastDay) {
    lastDay = now;
    getToday();
    saveStore();
    render();
  }
  const tEl = document.getElementById('meta-time');
  if (tEl) tEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}, 30000);

/* ============================================================
   INIT
   ============================================================ */
// Render uses the live gap (daysSinceLastOpen) BEFORE we restamp lastOpen.
getToday();
maybeCountToday();
render();
// Stamp today as last open so tomorrow's welcome-back math is correct.
store.lastOpen = todayKey();
saveStore();

</script>
</body>
</html>
